<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Style Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0b141e; /* アマプラ標準の深いネイビーブラック */
            --accent-color: #00a8e1; /* Prime ライトブルー */
            --text-color: #ffffff;
            --overlay-bg: rgba(0, 0, 0, 0.85);
            --control-bg: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.3) 70%, rgba(0, 0, 0, 0) 100%);
            --top-bg: linear-gradient(to bottom, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #000;
            color: var(--text-color);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ----------------------------------
         * 🔒 認証画面 (Amazonプライム風デザイン)
         * ---------------------------------- */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--primary-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #auth-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* 映画的な背景のボケ効果 */
        .auth-bg-blur {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(11, 20, 30, 0.85), rgba(11, 20, 30, 0.95)), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1000');
            background-size: cover;
            background-position: center;
            filter: blur(20px);
            transform: scale(1.1);
            z-index: -1;
        }

        .auth-container {
            text-align: center;
            width: 100%;
            max-width: 360px;
            padding: 20px;
        }

        .auth-logo {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }

        /* アマプラロゴ風のフォントとカラー */
        .text-logo {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            position: relative;
        }
        
        /* アマプラのスマイルアロー風アンダーライン */
        .text-logo::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; width: 60%; height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        .auth-container h2 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #f2f4f6;
        }

        .auth-container p {
            color: #79b1c9;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* ドット表示エリア */
        .pin-display-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border: 2px solid #465666;
            border-radius: 50%;
            transition: background-color 0.15s, border-color 0.15s, box-shadow 0.15s;
        }

        .pin-dot.filled {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0, 168, 225, 0.6);
        }

        .error-msg {
            color: #ff4a4a;
            font-size: 14px;
            min-height: 24px;
            margin-bottom: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* テンキーグリッド */
        .keypad-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 280px;
            margin: 0 auto;
        }

        .key-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 24px;
            font-weight: 500;
            height: 65px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            outline: none;
        }

        .key-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .key-btn:active {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .icon-key span {
            font-size: 22px;
            color: #aaa;
        }
        .key-btn:hover span {
            color: #fff;
        }

        .invisible {
            visibility: hidden;
            pointer-events: none;
        }

        /* ----------------------------------
         * 🎬 ビデオプレイヤーコア
         * ---------------------------------- */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        video::cue {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 20px;
        }

        /* ----------------------------------
         * 📺 UIレイヤー & コントロール
         * ---------------------------------- */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.4s;
            pointer-events: none;
        }

        .video-container.show-controls .ui-layer {
            opacity: 1;
            visibility: visible;
        }

        .video-container.hide-cursor {
            cursor: none;
        }

        .ui-layer * {
            pointer-events: auto;
        }

        /* トップ情報エリア */
        .top-overlay {
            background: var(--top-bg);
            padding: 30px 40px 60px 40px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .video-title {
            font-size: 24px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .video-meta {
            font-size: 14px;
            color: #ccc;
            display: flex;
            gap: 15px;
        }

        .video-desc {
            font-size: 14px;
            color: #aaa;
            max-width: 600px;
            margin-top: 5px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 中央の巨大再生ボタン */
        .center-play-btn {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 80px; height: 80px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
        }

        .center-play-btn span {
            font-size: 45px;
            color: #fff;
        }

        .video-container.show-controls .center-play-btn {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .center-play-btn:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
            transform: translate(-50%, -50%) scale(1.1);
        }

        /* ボトムコントロールエリア */
        .bottom-overlay {
            background: var(--control-bg);
            padding: 60px 30px 25px 30px;
        }

        /* シークバー */
        .timeline-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .timeline {
            background: rgba(255, 255, 255, 0.2);
            height: 4px;
            width: 100%;
            position: relative;
            border-radius: 2px;
            transition: height 0.1s;
        }

        .timeline-container:hover .timeline {
            height: 6px;
        }

        .buffered-bar {
            position: absolute;
            left: 0; top: 0; height: 100%;
            background: rgba(255, 255, 255, 0.3);
            width: 0%;
            border-radius: 2px;
        }

        .play-bar {
            position: absolute;
            left: 0; top: 0; height: 100%;
            background: var(--accent-color);
            width: 0%;
            border-radius: 2px;
        }

        .play-bar::after {
            content: '';
            position: absolute;
            right: -6px; top: 50%;
            transform: translateY(-50%) scale(0);
            width: 12px; height: 12px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.1s;
        }

        .timeline-container:hover .play-bar::after {
            transform: translateY(-50%) scale(1);
        }

        /* コントロールボタン群 */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            outline: none;
        }

        .icon-btn:hover {
            color: var(--accent-color);
        }

        .icon-btn span {
            font-size: 28px;
        }

        /* 時間表示 */
        .time-display {
            font-size: 14px;
            color: #eee;
            font-variant-numeric: tabular-nums;
        }

        /* 音量コンテナ */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 0;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
            transition: width 0.3s ease;
        }

        .volume-container:hover .volume-slider,
         .volume-slider:focus {
            width: 80px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        /* 倍速メニュー */
        .speed-container {
            position: relative;
        }

        .speed-menu {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 25, 30, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 5px 0;
            display: none;
            flex-direction: column;
            min-width: 80px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .speed-menu.show {
            display: flex;
        }

        .speed-option {
            background: none;
            border: none;
            color: #fff;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            outline: none;
        }

        .speed-option:hover, .speed-option.active {
            background: var(--accent-color);
        }

        /* スマホ用ダブルタップインジケーター */
        .tap-indicator {
            position: absolute;
            top: 0; width: 40%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.4s;
            border-radius: 50%;
        }
        #left-tap { left: 0; transform: translateX(-30%) scale(0.8); }
        #right-tap { right: 0; transform: translateX(30%) scale(0.8); }
        .tap-indicator.flash { opacity: 1; transform: translateX(0) scale(1) !important; }
        .tap-indicator span { font-size: 40px; color: #fff; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-bg-blur"></div>
        
        <div class="auth-container">
            <div class="auth-logo">
               <div class="auth-logo">
    <img src="your-logo.png" alt="Logo" style="width: 100%; max-width: 200px; height: auto;">
</div>
            </div>

            <h2>プロフィールのロック解除</h2>
            <p>4桁の暗証番号を入力して視聴を開始してください。</p>
            
            <div class="pin-display-wrapper">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>
            
            <div class="error-msg" id="error-msg">暗証番号が正しくありません。</div>

            <div class="keypad-container">
                <button class="key-btn" onclick="pressKey('1')">1</button>
                <button class="key-btn" onclick="pressKey('2')">2</button>
                <button class="key-btn" onclick="pressKey('3')">3</button>
                <button class="key-btn" onclick="pressKey('4')">4</button>
                <button class="key-btn" onclick="pressKey('5')">5</button>
                <button class="key-btn" onclick="pressKey('6')">6</button>
                <button class="key-btn" onclick="pressKey('7')">7</button>
                <button class="key-btn" onclick="pressKey('8')">8</button>
                <button class="key-btn" onclick="pressKey('9')">9</button>
                <button class="key-btn invisible"></button>
                <button class="key-btn" onclick="pressKey('0')">0</button>
                <button class="key-btn icon-key" onclick="pressKey('back')">
                    <span class="material-icons-outlined">backspace</span>
                </button>
            </div>
        </div>
    </div>

    <div class="video-container" id="video-container">
        
        <div id="left-tap" class="tap-indicator"><span class="material-icons-outlined">fast_rewind</span></div>
        <div id="right-tap" class="tap-indicator"><span class="material-icons-outlined">fast_forward</span></div>

        <video id="main-video" playsinline>
            <source src="movie.mp4" type="video/mp4">
            <track src="subtitles.vtt" kind="subtitles" srclang="ja" label="日本語" default>
            お使いのブラウザはビデオタグをサポートしていません。
        </video>

        <div class="center-play-btn" id="center-play-btn">
            <span class="material-icons-outlined" id="center-icon">play_arrow</span>
        </div>

        <div class="ui-layer">
            
            <div class="top-overlay">
                <div class="video-title">マイケル・ジャクソン This Is It</div>
                <div class="video-meta">
                    <span id="meta-duration">00:00</span>
                    <span>4K UHD</span>
                    <span>字幕</span>
                </div>
                <div class="video-desc">マイケル・ジャクソンの急死により幻となったロンドン公演をリハーサル映像を基に再現。キング・オブ・ポップの圧倒的なライブパフォーマンスが蘇るドキュメンタリー映画</div>
            </div>

            <div class="bottom-overlay">
                
                <div class="timeline-container" id="timeline-container">
                    <div class="timeline">
                        <div class="buffered-bar" id="buffered-bar"></div>
                        <div class="play-bar" id="play-bar"></div>
                    </div>
                </div>

                <div class="controls-row">
                    <div class="controls-left">
                        <button class="icon-btn" id="play-btn">
                            <span class="material-icons-outlined">play_arrow</span>
                        </button>
                        <button class="icon-btn" id="rew-btn">
                            <span class="material-icons-outlined">replay_10</span>
                        </button>
                        <button class="icon-btn" id="fwd-btn">
                            <span class="material-icons-outlined">forward_10</span>
                        </button>
                        <div class="volume-container">
                            <button class="icon-btn" id="mute-btn">
                                <span class="material-icons-outlined">volume_up</span>
                            </button>
                            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
                        </div>
                        <div class="time-display" id="time-display">0:00 / 0:00 (残り 0:00)</div>
                    </div>

                    <div class="controls-right">
                        <div class="speed-container">
                            <button class="icon-btn" id="speed-btn">
                                <span class="material-icons-outlined">speed</span>
                            </button>
                            <div class="speed-menu" id="speed-menu">
                                <button class="speed-option" data-speed="0.5">0.5x</button>
                                <button class="speed-option active" data-speed="1">1.0x</button>
                                <button class="speed-option" data-speed="1.5">1.5x</button>
                                <button class="speed-option" data-speed="2">2.0x</button>
                            </div>
                        </div>
                        <button class="icon-btn" id="pip-btn">
                            <span class="material-icons-outlined">picture_in_picture_alt</span>
                        </button>
                        <button class="icon-btn" id="fullscreen-btn">
                            <span class="material-icons-outlined">fullscreen</span>
                        </button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        const CORRECT_PIN = "9251"; // 🔒 暗証番号設定

        // DOM要素の取得
        const authOverlay = document.getElementById('auth-overlay');
        const errorMsg = document.getElementById('error-msg');
        
        const container = document.getElementById('video-container');
        const video = document.getElementById('main-video');
        const playBtn = document.getElementById('play-btn');
        const centerPlayBtn = document.getElementById('center-play-btn');
        const centerIcon = document.getElementById('center-icon');
        const rewBtn = document.getElementById('rew-btn');
        const fwdBtn = document.getElementById('fwd-btn');
        const muteBtn = document.getElementById('mute-btn');
        const volumeSlider = document.getElementById('volume-slider');
        const timeDisplay = document.getElementById('time-display');
        const metaDuration = document.getElementById('meta-duration');
        const timelineContainer = document.getElementById('timeline-container');
        const playBar = document.getElementById('play-bar');
        const bufferedBar = document.getElementById('buffered-bar');
        const speedBtn = document.getElementById('speed-btn');
        const speedMenu = document.getElementById('speed-menu');
        const pipBtn = document.getElementById('pip-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        const leftTap = document.getElementById('left-tap');
        const rightTap = document.getElementById('right-tap');

        /* ==========================================================
         * 🔒 認証ロジック (テンキー連動 & キーボード物理キー対応)
         * ========================================================== */
        let enteredPin = "";

        if (sessionStorage.getItem('video_unlocked') === 'true') {
            authOverlay.classList.add('hidden');
        } else {
            window.addEventListener('keydown', handlePhysicalKey);
        }

        function handlePhysicalKey(e) {
            if (sessionStorage.getItem('video_unlocked') === 'true') return;
            if (e.key >= '0' && e.key <= '9') {
                pressKey(e.key);
            } else if (e.key === 'Backspace') {
                pressKey('back');
            }
        }

        function pressKey(key) {
            if (key === 'back') {
                enteredPin = enteredPin.slice(0, -1);
            } else if (enteredPin.length < 4) {
                enteredPin += key;
            }

            updatePinDisplay();

            if (enteredPin.length === 4) {
                setTimeout(checkPIN, 150);
            }
        }

        function updatePinDisplay() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                if (index < enteredPin.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        function checkPIN() {
            if (enteredPin === CORRECT_PIN) {
                sessionStorage.setItem('video_unlocked', 'true');
                authOverlay.classList.add('hidden');
                window.removeEventListener('keydown', handlePhysicalKey);
            } else {
                errorMsg.style.opacity = '1';
                enteredPin = "";
                updatePinDisplay();
                setTimeout(() => { errorMsg.style.opacity = '0'; }, 3000);
            }
        }

        /* ==========================================================
         * 🎬 ビデオ制御基盤 (再生・一時停止・各種ボタン)
         * ========================================================== */
        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.querySelector('span').textContent = 'pause';
                centerIcon.textContent = 'pause';
            } else {
                video.pause();
                playBtn.querySelector('span').textContent = 'play_arrow';
                centerIcon.textContent = 'play_arrow';
            }
        }
        playBtn.addEventListener('click', togglePlay);
        centerPlayBtn.addEventListener('click', togglePlay);

        rewBtn.addEventListener('click', () => video.currentTime = Math.max(0, video.currentTime - 10));
        fwdBtn.addEventListener('click', () => video.currentTime = Math.min(video.duration, video.currentTime + 10));

        let lastVolume = 1;
        function toggleMute() {
            if (video.muted) {
                video.muted = false;
                video.volume = lastVolume;
                volumeSlider.value = lastVolume;
                muteBtn.querySelector('span').textContent = lastVolume > 0.5 ? 'volume_up' : 'volume_down';
            } else {
                lastVolume = video.volume;
                video.muted = true;
                video.volume = 0;
                volumeSlider.value = 0;
                muteBtn.querySelector('span').textContent = 'volume_off';
            }
        }
        muteBtn.addEventListener('click', toggleMute);
        
        volumeSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            video.volume = val;
            video.muted = val == 0;
            if(val == 0) muteBtn.querySelector('span').textContent = 'volume_off';
            else if(val < 0.5) muteBtn.querySelector('span').textContent = 'volume_down';
            else muteBtn.querySelector('span').textContent = 'volume_up';
        });

        /* ==========================================================
         * 📺 時間表示 & シークバー制御
         * ========================================================== */
        function formatTime(time) {
            if (isNaN(time)) return "0:00";
            const mins = Math.floor(time / 60);
            const secs = Math.floor(time % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        video.addEventListener('timeupdate', () => {
            const percentage = (video.currentTime / video.duration) * 100;
            playBar.style.width = `${percentage}%`;
            
            const current = formatTime(video.currentTime);
            const total = formatTime(video.duration);
            const remaining = formatTime(video.duration - video.currentTime);
            timeDisplay.textContent = `${current} / ${total} (残り ${remaining})`;
        });

        video.addEventListener('loadedmetadata', () => {
            metaDuration.textContent = formatTime(video.duration);
        });

        video.addEventListener('progress', () => {
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const duration = video.duration;
                bufferedBar.style.width = `${(bufferedEnd / duration) * 100}%`;
            }
        });

        function scrub(e) {
            const scrubTime = (e.offsetX / timelineContainer.offsetWidth) * video.duration;
            video.currentTime = scrubTime;
        }
        let isScrubbing = false;
        timelineContainer.addEventListener('mousedown', (e) => { isScrubbing = true; scrub(e); });
        window.addEventListener('mousemove', (e) => { if (isScrubbing) scrub(e); });
        window.addEventListener('mouseup', () => isScrubbing = false);

        /* ==========================================================
         * ⚙️ 倍速メニュー / PiP / フルスクリーン
         * ========================================================== */
        speedBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            speedMenu.classList.toggle('show');
        });
        document.addEventListener('click', () => speedMenu.classList.remove('show'));
        
        document.querySelectorAll('.speed-option').forEach(option => {
            option.addEventListener('click', (e) => {
                document.querySelector('.speed-option.active').classList.remove('active');
                e.target.classList.add('active');
                video.playbackRate = parseFloat(e.target.dataset.speed);
            });
        });

        if (!document.pictureInPictureEnabled) pipBtn.style.display = 'none';
        pipBtn.addEventListener('click', async () => {
            try {
                if (video !== document.pictureInPictureElement) await video.requestPictureInPicture();
                else await document.exitPictureInPicture();
            } catch (error) { console.error(error); }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => alert(err.message));
                fullscreenBtn.querySelector('span').textContent = 'fullscreen_exit';
            } else {
                document.exitFullscreen();
                fullscreenBtn.querySelector('span').textContent = 'fullscreen';
            }
        }
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        /* ==========================================================
         * 📺 コントロール自動表示・非表示
         * ========================================================== */
        let controlsTimeout;
        function showControls() {
            container.classList.add('show-controls');
            container.classList.remove('hide-cursor');
            clearTimeout(controlsTimeout);
            
            if (!video.paused) {
                controlsTimeout = setTimeout(() => {
                    container.classList.remove('show-controls');
                    container.classList.add('hide-cursor');
                }, 3000);
            }
        }

        container.addEventListener('mousemove', showControls);
        video.addEventListener('play', showControls);
        video.addEventListener('pause', () => {
            clearTimeout(controlsTimeout);
            container.classList.add('show-controls');
            container.classList.remove('hide-cursor');
        });

        /* ==========================================================
         * 📱 スマホ対応（ダブルタップで10秒送り戻し）
         * ========================================================== */
        let lastTapTime = 0;
        container.addEventListener('touchstart', (e) => {
            if(e.target.closest('.ui-layer *')) return;

            const now = Date.now();
            const tapGap = now - lastTapTime;
            const rect = container.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            
            if (tapGap < 300) {
                if (touchX < rect.width / 2) {
                    video.currentTime = Math.max(0, video.currentTime - 10);
                    flashIndicator(leftTap);
                } else {
                    video.currentTime = Math.min(video.duration, video.currentTime + 10);
                    flashIndicator(rightTap);
                }
                e.preventDefault();
            } else {
                showControls();
            }
            lastTapTime = now;
        });

        function flashIndicator(element) {
            element.classList.add('flash');
            setTimeout(() => element.classList.remove('flash'), 400);
        }

        /* ==========================================================
         * ⌨ キーボードショートカット
         * ========================================================== */
        window.addEventListener('keydown', (e) => {
            if (sessionStorage.getItem('video_unlocked') !== 'true') return;

            switch(e.key.toLowerCase()) {
                case ' ':
                case 'spacebar':
                    e.preventDefault();
                    togglePlay();
                    showControls();
                    break;
                case 'arrowleft':
                    e.preventDefault();
                    video.currentTime = Math.max(0, video.currentTime - 10);
                    showControls();
                    break;
                case 'arrowright':
                    e.preventDefault();
                    video.currentTime = Math.min(video.duration, video.currentTime + 10);
                    showControls();
                    break;
                case 'arrowup':
                    e.preventDefault();
                    video.volume = Math.min(1, video.volume + 0.1);
                    volumeSlider.value = video.volume;
                    showControls();
                    break;
                case 'arrowdown':
                    e.preventDefault();
                    video.volume = Math.max(0, video.volume - 0.1);
                    volumeSlider.value = video.volume;
                    showControls();
                    break;
                case 'f':
                    e.preventDefault();
                    toggleFullscreen();
                    break;
                case 'm':
                    e.preventDefault();
                    toggleMute();
                    showControls();
                    break;
            }
        });
    </script>
</body>
</html>
